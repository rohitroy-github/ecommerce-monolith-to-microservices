spring:
  application:
    name: order-service
  datasource:
    url: jdbc:mysql://localhost:3306/ecomv1_order_db
    username: root
    password: rootadmin
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

services:
  product:
    url: http://localhost:8081
  payment:
    url: http://localhost:8083

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health, info