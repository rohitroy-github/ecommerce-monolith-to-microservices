spring:
  application:
    name: product-service
  datasource:
    url: jdbc:mysql://localhost:3306/ecomv1_product_db
    username: root
    password: rootadmin
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health, info