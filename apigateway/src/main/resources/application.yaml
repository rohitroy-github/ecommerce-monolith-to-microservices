spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            # Product Service Route
            - id: product-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/products/**

            # Order Service Route
            - id: order-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/orders/**
            # Payment Service Route

            - id: payment-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/payments/**

            # User Service Route
            - id: user-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/users/**

# Legacy Service URLs (for fallback or internal use)
services:
  order:
    url: http://localhost:8082
    timeout: 10000
    retry-attempts: 3
  product:
    url: http://localhost:8081
    timeout: 10000
    retry-attempts: 3
  payment:
    url: http://localhost:8083
    timeout: 10000
    retry-attempts: 3
  user:
    url: http://localhost:8084
    timeout: 10000
    retry-attempts: 3

server:
  port: 8080

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000  # 24 hours (in milliseconds)
  
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway, circuitbreakers
  endpoint:
    gateway:
      enabled: true
  health:
    circuitbreakers:
      enabled: true
